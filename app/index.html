<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <link rel="stylesheet" href="src/style.css">
  <title>Document</title>
</head>
<body>
  <span style="position: absolute;" id="new-peer"></span>
  
  <div class="content">
    <h2 id="selfId"></h2>

    <div class="send-forms">
      <div class="controls">
        <input type="text" name="recipient" id="recipient" placeholder="recipient">
        <input type="text" name="message" id="message" placeholder="message">
        <button id="send-button">send</button>
      </div>

      <div class="controls">
        <input type="text" name="task-header" id="task-header" placeholder="header">
        <input type="text" name="task-desc" id="task-desc" placeholder="description">
        <button id="task-button">create</button>
      </div>
    </div>

    <div class="tasksNchat">
      <div>
        <h2>Tasks</h2>
        <div id="tasks">
        </div>
      </div>
      <div>
        <h2>Chat</h2>
        <div id="chat">
        </div>
      </div>
    </div>
  </div>

  <script type="module" src="src/script.js"></script>
</body>
</html>
