<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <link rel="stylesheet" href="src/style.css">
  <title>P2P Bounty Board</title>
</head>
<body>
  <div class="content">

    <div class="lside">
      <div>

        <div id="selfId"></div>

        <div class="controls">
          <div>Send message</div>
          <input type="text" name="recipient" id="message__recipient" placeholder="recipient">
          <input type="text" name="message" id="message__content" placeholder="message">
          <button id="send-button" class="clickable button">Send</button>
        </div>
  
        <div class="controls">
          <div>Create task</div>
          <input type="text" name="task__header" id="task__header" placeholder="header">
          <input type="text" name="task__desc" id="task__desc" placeholder="description">
          <button id="task__button" class="clickable button">Create</button>
        </div>

        <div class="controls">
          <div>Task actions</div>
          <div id="task__actions">Click on task</div>
        </div>

        <div class="controls">
          <div>Peer actions</div>
          <div id="peer__actions">Click on peer</div>
        </div>

      </div>

      <div class="controls">
        <div>USDT Address</div>
        <input type="text" name="recipient-address" id="recipient-address" placeholder="Your USDT Address">
        <button id="save-address-button" class="button">Save address</button>
      </div>

    </div>

    <div class="main">
      <div class="tasks-wrap">
        <div class="tasks-wrap__header">Tasks</div>
        <div id="tasks"></div>
      </div>
      <div class="chat-wrap">
        <div class="chat-wrap__header">Chat</div>
        <div id="chat"></div>
      </div>
    </div>

    <div class="rside">
      <div class="peers__header">Peers</div>
      <div id="peers">
        <div>Connecting to other peers<br>(if there are any)<br>(this might take a while)</div>
        <div class="hint button peers__hint clickable">You can click on peers that will appear here to send them messages!<br>(click on hint to dismiss it)</div>
      </div>
    </div>
  </div>

  <script type="module" src="src/script.js"></script>
</body>
</html>
