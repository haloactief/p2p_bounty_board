services:
  bttracker:
    build: ./bttracker
    restart: always
    ports:
      - 8000:8000
  
  nginx:
    build: ./app
    restart: always
    environment:
      - DOMAIN=domain
    ports:
      - 80:80
      - 443:443
    volumes:
      - ./certs:/etc/nginx/certs
      # - ./html:/usr/share/nginx/html
      - ./default.conf:/etc/nginx/conf.d/default.conf

