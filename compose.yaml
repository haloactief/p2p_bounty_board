services:
  bttracker:
    build: ./bttracker
    ports:
      - 8000:8000
  
  nginx:
    image: nginx
    ports:
      - 80:80
      - 443:443
    volumes:
      - ./certs:/etc/nginx/certs
      - ./html:/usr/share/nginx/html
      - ./default.conf:/etc/nginx/conf.d/default.conf

  coturn:
    image: coturn/coturn
    restart: always
    ports:
      - 3478:3478
      - 3478:3478/udp
      - 50000-50100:50000-50100
    volumes:
      - ./coturn/turnserver.conf:/etc/turnserver.conf